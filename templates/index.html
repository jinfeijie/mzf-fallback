<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>支付兜底后台</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap");
    :root {
      --bg-0: #fef7f0;
      --bg-1: #fffdfb;
      --bg-2: #fff5ee;
      --bg-3: #f0e0d3;
      --text-0: #2d1f16;
      --text-1: #6b5040;
      --text-2: #a08070;
      --accent: #f06030;
      --accent-hot: #e04820;
      --accent-2: #ff8c42;
      --ok: #2da05d;
      --err: #d04040;
      --warn: #e89820;
      --info: #5088cc;
      --surface: var(--bg-1);
      --surface-soft: var(--bg-2);
      --border: var(--bg-3);
      --text: var(--text-0);
      --muted: var(--text-1);
      --subtle: var(--text-2);
      --shadow-sm: 0 10px 24px rgba(240, 96, 48, 0.08);
      --shadow-md: 0 18px 40px rgba(240, 96, 48, 0.12);
      --focus-ring: 0 0 0 3px rgba(240, 96, 48, 0.18);
      --radius-card: 18px;
      --radius-control: 10px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Outfit", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at top left, rgba(255, 140, 66, 0.16), transparent 28%), var(--bg-0); color: var(--text); }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 32px 24px 40px; }
    h1, h2, button, input, textarea, select { font-family: "Outfit", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    h1 { margin: 0 0 12px; font-size: 34px; line-height: 1.1; }
    h2 { margin: 0 0 18px; font-size: 26px; line-height: 1.15; }
    .hint { color: var(--muted); margin-bottom: 20px; font-size: 15px; line-height: 1.5; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 22px; box-shadow: var(--shadow-sm); }
    .full { grid-column: 1 / -1; }
    .row { display: flex; gap: 14px; flex-wrap: wrap; }
    .row.between { justify-content: space-between; align-items: center; }
    .field { flex: 1; min-width: 220px; margin-bottom: 12px; }
    label { display: block; color: var(--muted); font-size: 13px; margin-bottom: 6px; font-weight: 500; }
    input, textarea, select { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-control); padding: 11px 13px; font-size: 14px; background: var(--surface); color: var(--text); transition: border-color .18s ease, box-shadow .18s ease, background-color .18s ease; }
    input::placeholder, textarea::placeholder { color: var(--subtle); }
    input:focus, textarea:focus, select:focus { outline: 0; border-color: var(--accent); box-shadow: var(--focus-ring); background: #fff; }
    textarea { min-height: 88px; resize: vertical; }
    button { border: 0; border-radius: 8px; padding: 11px 15px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; cursor: pointer; font-size: 14px; font-weight: 600; box-shadow: 0 10px 18px rgba(240, 96, 48, 0.2); transition: transform .16s ease, box-shadow .16s ease, filter .16s ease; }
    button:hover { transform: translateY(-1px); box-shadow: 0 14px 24px rgba(240, 96, 48, 0.24); filter: saturate(1.04); }
    button:focus-visible { outline: 0; box-shadow: var(--focus-ring); }
    button.secondary { background: var(--surface-soft); color: var(--text); border: 1px solid var(--border); box-shadow: none; }
    button.secondary:hover { box-shadow: var(--shadow-sm); }
    button.danger { background: linear-gradient(135deg, var(--err), #b93131); }
    .pill { display: inline-flex; align-items: center; padding: 7px 12px; border-radius: 999px; background: var(--surface-soft); color: var(--accent-hot); border: 1px solid var(--border); font-size: 13px; font-weight: 600; }
    .kv { display: grid; grid-template-columns: 180px 1fr; gap: 8px 12px; }
    .kv.section { margin-top: 16px; }
    .kv div:nth-child(odd) { color: var(--muted); }
    .kv div:nth-child(even) { font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--text); }
    .channel { border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-top: 12px; background: var(--surface-soft); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    #toast { position: fixed; top: 18px; right: 18px; display: none; max-width: min(360px, calc(100vw - 36px)); padding: 13px 15px; border-radius: 12px; color: #fff; background: var(--text); box-shadow: var(--shadow-md); z-index: 9; }
    @media (max-width: 860px) {
      .wrap { padding: 24px 16px 32px; }
      .grid, .kv { grid-template-columns: 1fr; }
      h1 { font-size: 30px; }
      h2 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>支付兜底后台</h1>
    <div class="hint">手动操作会立即生效，但自动监控仍会继续收敛。</div>

    <div class="grid">
      <section class="card full">
        <div class="row between">
          <div class="pill" id="state-pill">状态加载中</div>
          <div class="actions">
            <button class="secondary" onclick="reloadNow()">立即巡检</button>
            <button onclick="refreshAll()">刷新</button>
            <button class="secondary" onclick="logoutNow()">退出登录</button>
          </div>
        </div>
        <div id="channels"></div>
        <div class="kv section">
          <div>最近检测时间</div><div id="last-check">-</div>
          <div>最近切换时间</div><div id="last-switch">-</div>
          <div>最近动作</div><div id="last-action">-</div>
          <div>最近错误</div><div id="last-error">-</div>
        </div>
      </section>

      <section class="card full">
        <h2>基础配置</h2>
        <div class="row">
          <div class="field"><label>接口地址</label><input id="base_url"></div>
          <div class="field"><label>授权信息</label><textarea id="authorization"></textarea></div>
        </div>
        <div class="row">
          <div class="field"><label>登录账号</label><input id="login_username"></div>
          <div class="field"><label>登录密码</label><input id="login_password" type="password"></div>
        </div>
        <div class="row">
          <div class="field"><label>个人码编码</label><input id="primary_code"></div>
          <div class="field"><label>企业码编码</label><input id="fallback_code"></div>
        </div>
        <div class="row">
          <div class="field"><label>轮询间隔（秒）</label><input id="poll_interval_sec" type="number"></div>
          <div class="field"><label>请求超时（秒）</label><input id="http_timeout_sec" type="number"></div>
          <div class="field"><label>个人码下线确认次数</label><input id="down_confirm_times" type="number"></div>
          <div class="field"><label>个人码恢复确认次数</label><input id="recover_confirm_times" type="number"></div>
        </div>
        <div class="row">
          <div class="field"><label>最大重试次数</label><input id="max_retry" type="number"></div>
          <div class="field"><label>最大退避秒数</label><input id="backoff_max_sec" type="number"></div>
        </div>
        <div class="actions"><button onclick="saveConfig()">保存配置</button></div>
      </section>

      <section class="card">
        <h2>Bark 通知配置</h2>
        <div class="field"><label>Bark 地址</label><input id="bark_base_url"></div>
        <div class="field"><label>Bark 设备码</label><input id="bark_device_key"></div>
        <div class="row">
          <div class="field"><label>Bark 分组</label><input id="bark_group"></div>
          <div class="field"><label>Bark 提示音</label><input id="bark_sound"></div>
        </div>
        <div class="actions"><button onclick="testBark()">发送测试提醒</button></div>
      </section>

      <section class="card">
        <h2>手动控制</h2>
        <div id="manual-actions" class="hint">先刷新状态获取渠道编号。</div>
      </section>
    </div>
  </div>
  <div id="toast"></div>
  <script>
    let current = null;

    function showToast(text, error=false) {
      const node = document.getElementById('toast');
      node.textContent = text;
      node.style.display = 'block';
      node.style.background = error ? '#dc2626' : '#111827';
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => node.style.display = 'none', 2500);
    }

    async function fetchJSON(url, options={}) {
      const resp = await fetch(url, { headers: { 'content-type': 'application/json' }, ...options });
      if (resp.status === 401) {
        window.location.href = '/login';
        throw new Error('请重新登录');
      }
      const data = await resp.json();
      if (!resp.ok || data.error) throw new Error(data.error || `请求失败: ${resp.status}`);
      return data.data;
    }

    function fillConfig(cfg) {
      ['base_url','authorization','login_username','login_password','primary_code','fallback_code','poll_interval_sec','http_timeout_sec','down_confirm_times','recover_confirm_times','max_retry','backoff_max_sec','bark_base_url','bark_device_key','bark_group','bark_sound'].forEach((id) => {
        const el = document.getElementById(id);
        if (el && cfg[id] !== undefined && cfg[id] !== null) el.value = cfg[id];
      });
    }

    function channelHTML(item) {
      const on = Number(item.status) === 1;
      const actionText = on ? '关闭' : '打开';
      const targetStatus = on ? 2 : 1;
      const statusText = Number(item.status) === 1 ? '已开启' : Number(item.status) === 2 ? '已关闭' : `未知（${item.status}）`;
      const onlineText = Number(item.online) === 1 ? '在线' : Number(item.online) === 0 ? '离线' : `未知（${item.online}）`;
      return `
        <div class="channel">
          <div class="kv">
            <div>名称</div><div>${item.name || '-'}</div>
            <div>编号</div><div>${item.id}</div>
            <div>编码</div><div>${item.code || '-'}</div>
            <div>状态</div><div>${statusText}</div>
            <div>在线</div><div>${onlineText}</div>
          </div>
          <div class="actions">
            <button class="${on ? 'danger' : ''}" onclick="switchChannel(${item.id}, ${targetStatus})">${actionText} ${item.name || item.code}</button>
          </div>
        </div>`;
    }

    function renderStatus(status) {
      current = status;
      const stateMap = {
        PRIMARY_ACTIVE: '主路开启',
        FALLBACK_ACTIVE: '兜底开启',
        SWITCHING_TO_FALLBACK: '正在切换到兜底',
        SWITCHING_TO_PRIMARY: '正在切换回主路',
      };
      document.getElementById('state-pill').textContent = `状态机：${stateMap[status.state] || status.state}`;
      document.getElementById('last-check').textContent = status.last_check_at || '-';
      document.getElementById('last-switch').textContent = status.last_switch_at || '-';
      const actionMap = {
        checked: '已检查',
        switch_to_fallback: '切换到兜底',
        switch_to_primary: '切回主路',
        manual_switch: '手动开关',
      };
      document.getElementById('last-action').textContent = actionMap[status.last_action] || status.last_action || '-';
      document.getElementById('last-error').textContent = status.last_error || '-';
      document.getElementById('channels').innerHTML = [status.primary, status.fallback].filter(Boolean).map(channelHTML).join('');
      document.getElementById('manual-actions').innerHTML = [status.primary, status.fallback].filter(Boolean).map((item) => {
        const on = Number(item.status) === 1;
        const actionText = on ? '关闭' : '打开';
        const targetStatus = on ? 2 : 1;
        return `
        <div class="channel">
          <strong>${item.name || item.code}</strong>（编号：${item.id}）
          <div class="actions">
            <button class="${on ? 'danger' : ''}" onclick="switchChannel(${item.id}, ${targetStatus})">${actionText}</button>
          </div>
        </div>`;
      }).join('');
    }

    async function refreshAll() {
      try {
        const [status, cfg] = await Promise.all([fetchJSON('/api/status'), fetchJSON('/api/config')]);
        renderStatus(status);
        fillConfig(cfg);
      } catch (e) {
        showToast(e.message, true);
      }
    }

    async function saveConfig() {
      const payload = {
        base_url: document.getElementById('base_url').value,
        authorization: document.getElementById('authorization').value,
        login_username: document.getElementById('login_username').value,
        login_password: document.getElementById('login_password').value,
        primary_code: document.getElementById('primary_code').value,
        fallback_code: document.getElementById('fallback_code').value,
        poll_interval_sec: Number(document.getElementById('poll_interval_sec').value),
        http_timeout_sec: Number(document.getElementById('http_timeout_sec').value),
        down_confirm_times: Number(document.getElementById('down_confirm_times').value),
        recover_confirm_times: Number(document.getElementById('recover_confirm_times').value),
        max_retry: Number(document.getElementById('max_retry').value),
        backoff_max_sec: Number(document.getElementById('backoff_max_sec').value),
        bark_base_url: document.getElementById('bark_base_url').value,
        bark_device_key: document.getElementById('bark_device_key').value,
        bark_group: document.getElementById('bark_group').value,
        bark_sound: document.getElementById('bark_sound').value,
      };
      try {
        await fetchJSON('/api/config', { method: 'POST', body: JSON.stringify(payload) });
        showToast('配置已保存');
        await refreshAll();
      } catch (e) {
        showToast(e.message, true);
      }
    }

    async function switchChannel(id, status) {
      try {
        await fetchJSON('/api/action/switch', { method: 'POST', body: JSON.stringify({ id, status }) });
        showToast('操作已执行');
        await refreshAll();
      } catch (e) {
        showToast(e.message, true);
      }
    }

    async function reloadNow() {
      try {
        const status = await fetchJSON('/api/action/reload', { method: 'POST' });
        renderStatus(status);
        showToast('巡检完成');
      } catch (e) {
        showToast(e.message, true);
      }
    }

    async function testBark() {
      const payload = {
        bark_base_url: document.getElementById('bark_base_url').value,
        bark_device_key: document.getElementById('bark_device_key').value,
        bark_group: document.getElementById('bark_group').value,
        bark_sound: document.getElementById('bark_sound').value,
        login_username: document.getElementById('login_username').value,
        login_password: document.getElementById('login_password').value,
      };
      try {
        await fetchJSON('/api/action/test-bark', { method: 'POST', body: JSON.stringify(payload) });
        showToast('测试通知已发送');
      } catch (e) {
        showToast(e.message, true);
      }
    }

    async function logoutNow() {
      try {
        await fetch('/logout', { method: 'POST' });
      } finally {
        window.location.href = '/login';
      }
    }

    refreshAll();
    setInterval(refreshAll, 10000);
  </script>
</body>
</html>
